    <text x="470" y="171" text-anchor="middle" font-size="11" font-weight="600" fill="#6a1b9a">Intrachunk Cohesion</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="400" y="196" width="140" height="36" rx="7" fill="url(#metricGrad)" stroke="#ce93d8" stroke-width="1.2"/>
    <text x="470" y="219" text-anchor="middle" font-size="11" font-weight="600" fill="#6a1b9a">Context Coherence</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="400" y="244" width="140" height="36" rx="7" fill="url(#metricGrad)" stroke="#ce93d8" stroke-width="1.2"/>
    <text x="470" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#6a1b9a">Block Integrity</text>
  </g>
  <g filter="url(#shadow)">
