<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#d1ecf1"/>
    </linearGradient>
    <linearGradient id="methodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="metricGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
    <linearGradient id="selectGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#78909c"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#fafbfc" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">How Adaptive Chunking Works</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#78909c">For each document, evaluate every method × every metric, then pick the best</text>

  <!-- ─── Column 1: Documents ─── -->
  <text x="80" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#37474f">Corpus</text>

  <g filter="url(#shadow)">
    <rect x="20" y="100" width="120" height="44" rx="8" fill="url(#docGrad)" stroke="#90caf9" stroke-width="1.2"/>
    <text x="80" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Doc 1</text>
    <text x="80" y="134" text-anchor="middle" font-size="9" fill="#546e7a">technical report</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="20" y="156" width="120" height="44" rx="8" fill="url(#docGrad)" stroke="#90caf9" stroke-width="1.2"/>
    <text x="80" y="176" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Doc 2</text>
    <text x="80" y="190" text-anchor="middle" font-size="9" fill="#546e7a">legal contract</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="20" y="212" width="120" height="44" rx="8" fill="url(#docGrad)" stroke="#90caf9" stroke-width="1.2"/>
    <text x="80" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Doc 3</text>
    <text x="80" y="246" text-anchor="middle" font-size="9" fill="#546e7a">ESG report</text>
  </g>

  <text x="80" y="278" text-anchor="middle" font-size="16" fill="#90a4ae">...</text>

  <g filter="url(#shadow)">
    <rect x="20" y="290" width="120" height="44" rx="8" fill="url(#docGrad)" stroke="#90caf9" stroke-width="1.2"/>
    <text x="80" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Doc N</text>
    <text x="80" y="324" text-anchor="middle" font-size="9" fill="#546e7a">any document</text>
  </g>

  <!-- Lines: docs → methods (fully connected) -->
