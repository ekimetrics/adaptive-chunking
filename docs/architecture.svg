  <line x1="335" y1="262" x2="400" y2="310" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
  <line x1="335" y1="262" x2="400" y2="358" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
  <!-- Your method (y=314) to all metrics -->
  <line x1="335" y1="314" x2="400" y2="118" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
  <line x1="335" y1="314" x2="400" y2="166" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
  <line x1="335" y1="314" x2="400" y2="214" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
  <line x1="335" y1="314" x2="400" y2="262" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
  <line x1="335" y1="314" x2="400" y2="310" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
  <line x1="335" y1="314" x2="400" y2="358" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>

  <!-- ─── Column 3: Metrics ─── -->
  <text x="470" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#37474f">Quality Metrics</text>

  <g filter="url(#shadow)">
