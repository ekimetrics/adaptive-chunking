    <text x="265" y="171" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Semantic</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="195" y="196" width="140" height="36" rx="7" fill="url(#methodGrad)" stroke="#ffb74d" stroke-width="1.2"/>
    <text x="265" y="219" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Page</text>
