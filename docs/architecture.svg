    <text x="690" y="240" text-anchor="middle" font-size="10" fill="#546e7a">pick the method with</text>
    <text x="690" y="255" text-anchor="middle" font-size="10" fill="#546e7a">the highest average</text>
    <text x="690" y="270" text-anchor="middle" font-size="10" fill="#546e7a">quality score</text>
  </g>

  <!-- Lines: selection → output -->
  <line x1="760" y1="185" x2="800" y2="138" stroke="#78909c" stroke-width="0.8" opacity="0.5"/>
  <line x1="760" y1="210" x2="800" y2="206" stroke="#78909c" stroke-width="0.8" opacity="0.5"/>
  <line x1="760" y1="235" x2="800" y2="274" stroke="#78909c" stroke-width="0.8" opacity="0.5"/>

