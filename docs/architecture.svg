  <line x1="335" y1="118" x2="400" y2="166" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
  <line x1="335" y1="118" x2="400" y2="214" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
