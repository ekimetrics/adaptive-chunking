  <line x1="140" y1="234" x2="195" y2="166" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
  <line x1="140" y1="234" x2="195" y2="214" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
  <line x1="140" y1="234" x2="195" y2="262" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
  <line x1="140" y1="234" x2="195" y2="314" stroke="#78909c" stroke-width="0.8" opacity="0.35"/>
