  <text x="840" y="322" text-anchor="middle" font-size="14" fill="#90a4ae">...</text>

  <text x="840" y="348" text-anchor="middle" font-size="11" font-weight="600" fill="#37474f">Optimal chunks</text>
  <text x="840" y="362" text-anchor="middle" font-size="10" fill="#78909c">per document</text>

  <!-- ─── Bottom legend ─── -->
  <rect x="20" y="430" width="860" height="74" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="40" y="452" font-size="11" font-weight="600" fill="#37474f">Modular design:</text>
  <rect x="155" y="440" width="12" height="12" rx="2" fill="url(#methodGrad)" stroke="#ffb74d" stroke-width="0.8"/>
  <text x="172" y="451" font-size="10" fill="#546e7a">Add chunking methods — any function returning a list of strings</text>
  <rect x="155" y="460" width="12" height="12" rx="2" fill="url(#metricGrad)" stroke="#ce93d8" stroke-width="0.8"/>
