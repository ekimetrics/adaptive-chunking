  <text x="265" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#37474f">Chunking Methods</text>

  <g filter="url(#shadow)">
    <rect x="195" y="100" width="140" height="36" rx="7" fill="url(#methodGrad)" stroke="#ffb74d" stroke-width="1.2"/>
    <text x="265" y="123" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Recursive</text>
