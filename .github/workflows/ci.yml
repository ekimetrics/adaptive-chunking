name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      # The test suite mocks the heavy ML dependencies (spacy, sentence-transformers,
      # scikit-learn, scipy — see the roadmap to move them to a [metrics] extra), so
      # only the lightweight runtime deps are installed here. The full dependency
      # solve is validated separately by the `install` job.
      - name: Install package (light)
        run: |
          pip install pytest pytest-asyncio tiktoken pandas numpy langdetect tqdm python-dotenv httpx
          pip install -e . --no-deps

      - name: Run tests
        run: pytest

  install:
    name: full install check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Real user install from PyPI only (pulls the default CUDA torch build,
      # several GB — hence --no-cache-dir to stay within runner disk limits).
      - name: pip install
        run: pip install --no-cache-dir .

      - name: Import smoke test
        run: python -c "import adaptive_chunking; print(adaptive_chunking.__version__)"

  build:
    name: build distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build twine
          python -m build
          twine check --strict dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
